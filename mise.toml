[tools]
go = "1.26"
node = "24"
podman = "6"
golangci-lint = "2"
"go:go.k6.io/xk6" = "1"
"npm:prettier" = "3"
"github:zizmorcore/zizmor" = "1"

[tasks.build]
depends = ["build:go", "build:api-docs"]

[tasks."build:go"]
sources = ["pkg/**/*"]
outputs = ["k6*"]
run = "CGO_ENABLED=1 xk6 build --with github.com/mostafa/xk6-kafka/v2@latest=."

[tasks."build:api-docs"]
dir = "api-docs"
sources = ["api-docs/**/*.ts"]
outputs = ["docs/**", "v2/**"]
run = "npm run sync-docs:v2 && npm run generate-docs"

[tasks.test]
depends = ["test:unit"]

[tasks."test:unit"]
sources = ["pkg/**/*"]
run = "CGO_ENABLED=1 go test ./... -race"

[tasks.lint]
depends = ["lint:scripts", "lint:api-docs", "lint:actions"]

[tasks."lint:scripts"]
sources = ["scripts/**/*.js"]
run = "prettier --check scripts/**/*.js"

[tasks."lint:api-docs"]
depends = ["lint:api-docs:prettier", "lint:api-docs:validate"]

[tasks."lint:api-docs:prettier"]
sources = ["api-docs/**/*.ts"]
run = "prettier --check api-docs/**/*.ts"

[tasks."lint:api-docs:validate"]
sources = ["api-docs/**/*.ts"]
run = "prettier --check api-docs/**/*.ts"

[tasks."lint:actions"]
sources = [".github/**.yaml", ".github/*.yml"]
run = "zizmor ."

[tasks."verify"]
depends = ["build", "test", "lint"]

[settings]
lockfile = true

name: Build and publish xk6-kafka

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  linux-windows-binaries:
    name: Build Linux and Windows (amd64) binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Go 🧑‍💻
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.1"
          cache: false

      # Same native stack as smoke Linux (test.yaml "Install Linux native build prerequisites").
      - name: Install Linux native build prerequisites 🧰
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config librdkafka-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Install xk6 and build Linux and Windows xk6-kafka 🏗️
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go install go.k6.io/xk6/cmd/xk6@latest
          # Linux amd64 — native host toolchain (matches smoke on ubuntu-latest).
          GOOS=linux GOARCH=amd64 xk6 build --output "dist/xk6-kafka_${GITHUB_REF_NAME}_linux_amd64" --with "github.com/mostafa/xk6-kafka/v2@${GITHUB_REF_NAME}=."
          tar cvzf "dist/xk6-kafka_${GITHUB_REF_NAME}_linux_amd64.tar.gz" -C dist "xk6-kafka_${GITHUB_REF_NAME}_linux_amd64"
          # Linux arm64 — glibc cross-compiler must match target (vendored librdkafka .a is arm64).
          CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
            GOOS=linux GOARCH=arm64 xk6 build --output "dist/xk6-kafka_${GITHUB_REF_NAME}_linux_arm64" --with "github.com/mostafa/xk6-kafka/v2@${GITHUB_REF_NAME}=."
          tar cvzf "dist/xk6-kafka_${GITHUB_REF_NAME}_linux_arm64.tar.gz" -C dist "xk6-kafka_${GITHUB_REF_NAME}_linux_arm64"
          # Windows amd64 — MinGW-w64 cross compiler (same idea as smoke Windows: explicit CC/CXX for CGO).
          CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ \
            GOOS=windows GOARCH=amd64 xk6 build --output "dist/xk6-kafka_${GITHUB_REF_NAME}_windows_amd64.exe" --with "github.com/mostafa/xk6-kafka/v2@${GITHUB_REF_NAME}=."
          tar cvzf "dist/xk6-kafka_${GITHUB_REF_NAME}_windows_amd64.tar.gz" -C dist "xk6-kafka_${GITHUB_REF_NAME}_windows_amd64.exe"

      - name: Upload Linux and Windows dist artifacts 📤
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-dist-linux-windows
          path: dist

  darwin-binaries:
    name: Build macOS binaries
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Go 🧑‍💻
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.1"
          cache: false

      - name: Install macOS native build prerequisites 🧰
        run: brew install pkg-config librdkafka

      - name: Install xk6 and build macOS xk6-kafka 🏗️
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go install go.k6.io/xk6/cmd/xk6@latest
          GOOS=darwin GOARCH=amd64 xk6 build --output "dist/xk6-kafka_${GITHUB_REF_NAME}_darwin_amd64" --with "github.com/mostafa/xk6-kafka/v2@${GITHUB_REF_NAME}=."
          tar cvzf "dist/xk6-kafka_${GITHUB_REF_NAME}_darwin_amd64.tar.gz" -C dist "xk6-kafka_${GITHUB_REF_NAME}_darwin_amd64"
          GOOS=darwin GOARCH=arm64 xk6 build --output "dist/xk6-kafka_${GITHUB_REF_NAME}_darwin_arm64" --with "github.com/mostafa/xk6-kafka/v2@${GITHUB_REF_NAME}=."
          tar cvzf "dist/xk6-kafka_${GITHUB_REF_NAME}_darwin_arm64.tar.gz" -C dist "xk6-kafka_${GITHUB_REF_NAME}_darwin_arm64"

      - name: Upload macOS dist artifacts 📤
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-dist-darwin
          path: dist

  publish:
    name: Publish images and GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux-windows-binaries
      - darwin-binaries
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Go 🧑‍💻
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.1"
          cache: false

      - name: Download Linux and Windows binaries ⬇️
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: k6-dist-linux-windows
          path: _artifacts/linux-win

      - name: Download macOS binaries ⬇️
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: k6-dist-darwin
          path: _artifacts/darwin

      - name: Merge artifacts into dist for Docker build context 📂
        run: |
          mkdir -p dist
          cp -v _artifacts/linux-win/* _artifacts/darwin/* dist/
          ls -la dist

      - name: Generate CycloneDX SBOM artifacts 📃
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod mod -json -licenses -output "code-cyclonedx-xk6-kafka-${GITHUB_REF_NAME}.json"

      - name: Docker meta 📝
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: mostafamoradian/xk6-kafka
          tags: |
            type=semver,pattern={{version}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to DockerHub 🔒
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image 🛳️
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION_TAG=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign ⬇️
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign the Docker image ✍️
        run: echo "${STEPS_META_OUTPUTS_TAGS}" | xargs -I {} cosign sign -y docker.io/{}
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Verify the Docker image signature ✅
        run: |
          echo "${STEPS_META_OUTPUTS_TAGS}" | xargs -I {} cosign verify --certificate-identity ${IDENTITY} --certificate-oidc-issuer ${OIDC_ISSUER_URL} docker.io/{}
        env:
          IDENTITY: ${{ secrets.IDENTITY }}
          OIDC_ISSUER_URL: ${{ secrets.OIDC_ISSUER_URL }}
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Scan Docker image with Syft and generate SBOM 🦉
        uses: anchore/sbom-action@fbfd9c6c189226748411491745178e0c2017392d # v0.20.10
        with:
          artifact-name: docker-image-cyclonedx-xk6-kafka-${{ github.ref_name }}.json
          format: cyclonedx-json
          dependency-snapshot: true

      - name: Create Release 📦 and add binaries and SBOM files 💾
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            dist/*.tar.gz
            code-cyclonedx-xk6-kafka-${{ github.ref_name }}.json
            docker-image-cyclonedx-xk6-kafka-${{ github.ref_name }}.json
